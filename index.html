<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--s1:#161b27;--s2:#1c2235;--s3:#222840;
  --bd:#252e48;--bd2:#2e3a5a;
  --gold:#f0a500;--gold2:#ffd166;--green:#22c97a;--red:#ff5c5c;
  --blue:#4d9fff;--purple:#a78bfa;--orange:#ff9f43;
  --t1:#e8eeff;--t2:#8892b0;--t3:#4a5578;
  --r:12px;--r2:8px;--r3:6px;
}
body{background:var(--bg);color:var(--t1);font-family:'DM Sans',sans-serif;font-size:14px;min-height:100vh}
.app{max-width:1040px;margin:0 auto;padding:14px}
.login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:20px}
.login-card{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);padding:40px;text-align:center;max-width:380px;width:90%}
.login-logo{font-family:'DM Serif Display',serif;font-size:36px;color:var(--gold);margin-bottom:6px}
.login-sub{color:var(--t2);font-size:13px;margin-bottom:28px}
.login-form{display:flex;flex-direction:column;gap:12px;text-align:left}
.login-form label{font-size:11px;color:var(--t3);margin-bottom:4px;display:block}
.sync-bar{display:flex;align-items:center;justify-content:space-between;gap:6px;padding:6px 12px;border-radius:var(--r3);font-size:11px;margin-bottom:12px;background:var(--s1);border:1px solid var(--bd)}
.sync-left{display:flex;align-items:center;gap:6px}
.sync-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sync-dot.ok{background:var(--green)}.sync-dot.wait{background:var(--orange);animation:p 1s infinite}.sync-dot.err{background:var(--red)}
@keyframes p{0%,100%{opacity:1}50%{opacity:.3}}
.btn-logout{background:transparent;border:1px solid var(--bd);border-radius:var(--r3);padding:3px 10px;color:var(--t3);font-size:11px;cursor:pointer}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--bd)}
.logo{font-family:'DM Serif Display',serif;font-size:22px;color:var(--gold)}
.logo small{font-size:11px;color:var(--t3);display:block;font-family:'DM Sans',sans-serif}
.topbar-info{text-align:right;font-size:11px;color:var(--t3)}
.topbar-info strong{color:var(--gold);font-size:13px;display:block}
.nav{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:16px;background:var(--s1);padding:6px;border-radius:var(--r);border:1px solid var(--bd)}
.nb{padding:7px 12px;border-radius:var(--r2);border:none;background:transparent;color:var(--t3);font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:500;transition:all .15s;white-space:nowrap}
.nb:hover{color:var(--t2)}.nb.on{background:var(--gold);color:#0d1117;font-weight:600}
.sec{display:none}.sec.on{display:block}
.mg{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:16px}
.mc{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);padding:14px 12px}
.mc-l{font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:var(--t3);margin-bottom:5px}
.mc-v{font-family:'DM Serif Display',serif;font-size:22px}
.mc-v.g{color:var(--green)}.mc-v.r{color:var(--red)}.mc-v.gold{color:var(--gold)}.mc-v.b{color:var(--blue)}
.card{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);padding:16px;margin-bottom:12px}
.card-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.card-tt{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--t3)}
.tbl-wrap{overflow-x:auto}
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{text-align:left;padding:7px 8px;font-size:10px;text-transform:uppercase;color:var(--t3);border-bottom:1px solid var(--bd)}
.tbl td{padding:9px 8px;border-bottom:1px solid var(--bd);vertical-align:middle}
.btn-icon{padding:6px 10px;border-radius:var(--r3);background:var(--s3);border:1px solid var(--bd);color:var(--t2);cursor:pointer;margin-right:4px;transition:0.2s}
.btn-icon:hover{border-color:var(--gold);color:var(--gold)}
.btn-icon.del:hover{border-color:var(--red);color:var(--red)}
.fr{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;align-items:flex-end}
.fg{flex:1;min-width:110px}
.fi{padding:8px 10px;border:1px solid var(--bd);border-radius:var(--r2);background:var(--s2);color:var(--t1);width:100%}
.fi:focus{outline:none;border-color:var(--gold)}
.btn{padding:8px 16px;border-radius:var(--r2);border:none;cursor:pointer;font-weight:600}
.btn-g{background:var(--gold);color:#0d1117}
.btn-re{background:var(--red);color:#fff}
.empty{text-align:center;padding:28px;color:var(--t3);font-size:13px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:700px){.row2{grid-template-columns:1fr}}
.bk{display:inline-block;padding:2px 7px;border-radius:99px;font-size:10px;font-weight:600}
.bk-g{background:#0a2e1c;color:var(--green)}
.bk-r{background:#2e0a0a;color:var(--red)}
.bk-gold{background:#2a1f00;color:var(--gold)}
.bk-b{background:#0a1a2e;color:var(--blue)}
.ov{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.75);display:none;align-items:center;justify-content:center;z-index:999}
.ov.open{display:flex}
.modal{background:var(--s1);border:1px solid var(--bd2);border-radius:var(--r);padding:22px;width:90%;max-width:380px}
.modal h3{font-family:'DM Serif Display',serif;font-size:18px;color:var(--gold);margin-bottom:12px}
.modal label{font-size:11px;color:var(--t3);display:block;margin-bottom:4px;margin-top:10px}
.modal-btns{display:flex;gap:8px;margin-top:16px}
.modal-btns button{flex:1}
</style>

<script>
function togglePass(){

  var btn = document.getElementById('toggle-pass');

</script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js";

const appId = typeof __app_id !== 'undefined' ? __app_id : 'tonooz-v1';
const firebaseConfig = {
  apiKey: "AIzaSyBXmNolXfEv9Epgbg0YMprRpmaJHNsLWdY",
  authDomain: "tonooz.firebaseapp.com",
  projectId: "tonooz",
  storageBucket: "tonooz.firebasestorage.app",
  messagingSenderId: "261204053576",
  appId: "1:261204053576:web:d016777d567e4cb826527d"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);
const DOC_REF = doc(db, 'artifacts', appId, 'public', 'data', 'finanzas', 'principal');

let S = { clientes:[], prestamos:[], movimientos:[], socios:[] };
let unsub = null;

function expose(name, fn) { window[name] = fn; }

const $m = n => '$'+(+n||0).toFixed(2);
const hoy = () => new Date().toISOString().slice(0,10);
const HOY_MS = new Date().setHours(0,0,0,0);
function diffDias(f){ if(!f) return 999; return Math.round((new Date(f+'T00:00:00').setHours(0,0,0,0)-HOY_MS)/86400000); }
function proxFecha(p){ var i=(p.pagos||[]).length; if(p.fechas&&p.fechas[i]) return p.fechas[i]; return null; }
function generarFechas(fi,frec,nc){
  var fechas=[]; var d=new Date(fi+'T12:00:00');
  for(var i=0;i<nc;i++){
    if(frec==='SEMANAL') d=new Date(d.getTime()+7*86400000);
    else if(frec==='QUINCENAL') d=new Date(d.getTime()+15*86400000);
    else{d=new Date(d);d.setMonth(d.getMonth()+1);}
    fechas.push(d.toISOString().slice(0,10));
  }
  return fechas;
}

expose('nav',(id,btn)=>{
  document.querySelectorAll('.sec').forEach(s=>s.classList.remove('on'));
  const t=document.getElementById('sec-'+id); if(t) t.classList.add('on');
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('on'));
  if(btn) btn.classList.add('on');
});

expose('calcCuota',()=>{
  const cap=parseFloat(document.getElementById('np-cap').value)||0;
  const int=parseFloat(document.getElementById('np-int').value)||0;
  const nc=parseInt(document.getElementById('np-nc').value)||1;
  document.getElementById('np-res-cuota').textContent=$m((cap+int)/nc);
  document.getElementById('np-res-total').textContent=$m(cap+int);
});

expose('addCliente',async()=>{
  const n=document.getElementById('cl-nom').value.trim(); if(!n) return;
  S.clientes.push({id:createId(),nom:n,tel:document.getElementById('cl-tel').value});
  document.getElementById('cl-nom').value=''; document.getElementById('cl-tel').value='';
  await push();
});
expose('editCli',async id=>{
  const c=S.clientes.find(x=>x.id==id); if(!c) return;
  const n=prompt("Nuevo nombre:",c.nom); if(n) c.nom=n;
  const t=prompt("Nuevo WhatsApp:",c.tel); if(t!==null) c.tel=t;
  await push();
});
expose('delCli',async id=>{
  if(confirm("¿Eliminar cliente?")){S.clientes=S.clientes.filter(x=>x.id!=id); await push();}
});

expose('addPrestamo',async()=>{
  const cid=document.getElementById('np-cli').value;
  const cap=parseFloat(document.getElementById('np-cap').value);
  const int=parseFloat(document.getElementById('np-int').value)||0;
  const nc=parseInt(document.getElementById('np-nc').value)||11;
  const frec=document.getElementById('np-frec').value;
  const fi=document.getElementById('np-fecha').value||hoy();
  if(!cid||isNaN(cap)) return;
  const cuo=(cap+int)/nc;
  const cli=S.clientes.find(x=>x.id==cid);
  const fechas=generarFechas(fi,frec,nc);
  S.prestamos.push({id:createId(),cid,cap,int,cuo,nc,frec,fi,fechas,pagos:[]});
  registrarCaja('Prestamo a '+(cli?cli.nom:''),cap,'salida');
  ['np-cap','np-int'].forEach(i=>document.getElementById(i).value='');
  await push();
});
expose('delPre',async id=>{
  if(confirm("¿Eliminar préstamo?")){S.prestamos=S.prestamos.filter(x=>x.id!=id); await push();}
});
expose('editPre',async id=>{
  const p=S.prestamos.find(x=>x.id==id); if(!p) return;
  const c=prompt("Nuevo Capital:",p.cap); if(c) p.cap=parseFloat(c);
  const i=prompt("Nuevo Interés:",p.int||0); if(i!==null) p.int=parseFloat(i)||0;
  p.cuo=(p.cap+(p.int||0))/p.nc;
  await push();
});
expose('cobrar',async id=>{
  const p=S.prestamos.find(x=>x.id==id);
  const c=S.clientes.find(x=>x.id==p.cid);
  if(!p.pagos) p.pagos=[];
  p.pagos.push(hoy());
  registrarCaja('Cobro cuota: '+(c?c.nom:''),p.cuo,'entrada');
  await push();
});

expose('abrirMoverFecha',function(id){
  const p=S.prestamos.find(x=>x.id==id);
  const c=S.clientes.find(x=>x.id==p.cid);
  const i=(p.pagos||[]).length;
  const fa=proxFecha(p)||'';
  document.getElementById('modal-pre-info').textContent=(c?c.nom:'')+' — Cuota '+(i+1)+' de '+p.nc+' — Fecha actual: '+(fa||'no definida');
  document.getElementById('modal-nueva-fecha').value=fa;
  document.getElementById('ov-fecha').classList.add('open');
  document.getElementById('modal-ok').onclick=async function(){
    const nf=document.getElementById('modal-nueva-fecha').value;
    if(!nf){alert('Selecciona una fecha');return;}
    if(!p.fechas) p.fechas=generarFechas(p.fi||hoy(),p.frec||'SEMANAL',p.nc);
    p.fechas[i]=nf;
    await push();
    document.getElementById('ov-fecha').classList.remove('open');
  };
});
document.getElementById('ov-fecha').addEventListener('click',function(e){if(e.target===this)this.classList.remove('open');});

expose('addMovManual',async t=>{
  const c=document.getElementById('cj-con').value;
  const m=parseFloat(document.getElementById('cj-mon').value);
  if(!c||isNaN(m)) return;
  registrarCaja(c,m,t);
  document.getElementById('cj-con').value=''; document.getElementById('cj-mon').value='';
  await push();
});
expose('editMov',async id=>{
  const m=S.movimientos.find(x=>x.id==id); if(!m) return;
  const n=prompt("Nuevo concepto:",m.con); if(n) m.con=n;
  const v=prompt("Nuevo monto:",m.mon); if(v) m.mon=parseFloat(v);
  await push();
});
expose('delMov',async id=>{
  if(confirm("¿Borrar de caja?")){S.movimientos=S.movimientos.filter(x=>x.id!=id); await push();}
});

expose('addSocio',async()=>{
  const n=document.getElementById('soc-nom').value;
  const m=parseFloat(document.getElementById('soc-mon').value);
  if(!n||isNaN(m)) return;
  S.socios.push({id:createId(),nom:n,mon:m});
  registrarCaja('Cap. Socio: '+n,m,'entrada');
  document.getElementById('soc-nom').value=''; document.getElementById('soc-mon').value='';
  await push();
});
expose('editSoc',async id=>{
  const s=S.socios.find(x=>x.id==id); if(!s) return;
  const n=prompt("Nombre:",s.nom); if(n) s.nom=n;
  const v=prompt("Monto:",s.mon); if(v) s.mon=parseFloat(v);
  await push();
});
expose('delSoc',async id=>{
  if(confirm("¿Eliminar socio?")){S.socios=S.socios.filter(x=>x.id!=id); await push();}
});

document.getElementById('btn-login-action').addEventListener('click',async()=>{
  const e=document.getElementById('login-email').value;
  const p=document.getElementById('login-pass').value;
  try{await signInWithEmailAndPassword(auth,e,p);}
  catch(err){alert("Acceso denegado. Verifica tu correo y contraseña.");}
});
document.getElementById('btn-logout-action').addEventListener('click',()=>{if(unsub)unsub();signOut(auth);});

onAuthStateChanged(auth,(u)=>{
  if(u&&u.email==="antoniooz1991@gmail.com"){
    document.getElementById('login-screen').style.display='none';
    document.getElementById('main-app').style.display='block';
    load();
  } else {
    document.getElementById('login-screen').style.display='flex';
    document.getElementById('main-app').style.display='none';
  }
});

function createId(){return Date.now().toString(36)+Math.random().toString(36).substr(2,5);}

function load(){
  setSync('wait','Cargando...');
  getDoc(DOC_REF).then(snap=>{
    if(!snap.exists()) setDoc(DOC_REF,S);
    unsub=onSnapshot(DOC_REF,d=>{
      if(d.exists()){
        S=d.data();
        if(!S.clientes) S.clientes=[];
        if(!S.prestamos) S.prestamos=[];
        if(!S.movimientos) S.movimientos=[];
        if(!S.socios) S.socios=[];
        let fixed=false;
        ['movimientos','clientes','prestamos','socios'].forEach(k=>{
          if(S[k]) S[k].forEach(item=>{if(!item.id){item.id=createId();fixed=true;}});
        });
        if(fixed) setDoc(DOC_REF,S);
        render();
        setSync('ok','Sincronizado ✓');
      }
    });
  });
}

function setSync(c,m){
  const d=document.getElementById('sync-dot');
  const t=document.getElementById('sync-txt');
  if(d) d.className='sync-dot '+c;
  if(t) t.textContent=m;
}

async function push(){await setDoc(DOC_REF,S);}

function registrarCaja(con,mon,tipo){
  if(!S.movimientos) S.movimientos=[];
  S.movimientos.push({id:createId(),fec:hoy(),con,mon:Math.abs(mon),tipo});
}

function render(){
  document.getElementById('top-fecha').textContent=new Date().toLocaleDateString('es-EC',{weekday:'long',day:'numeric',month:'long'});

  const ent=(S.movimientos||[]).filter(m=>m.tipo==='entrada').reduce((a,m)=>a+m.mon,0);
  const sal=(S.movimientos||[]).filter(m=>m.tipo==='salida').reduce((a,m)=>a+m.mon,0);
  const caja=ent-sal;
  const calle=(S.prestamos||[]).reduce((a,p)=>a+Math.max(0,p.cuo*p.nc-((p.pagos||[]).length*p.cuo)),0);

  document.getElementById('res-metrics').innerHTML=
    '<div class="mc"><div class="mc-l">Caja Real</div><div class="mc-v g">'+$m(caja)+'</div></div>'+
    '<div class="mc"><div class="mc-l">En Calle</div><div class="mc-v gold">'+$m(calle)+'</div></div>'+
    '<div class="mc"><div class="mc-l">Socios</div><div class="mc-v b">'+$m((S.socios||[]).reduce((a,s)=>a+s.mon,0))+'</div></div>';

  var proximos=(S.prestamos||[]).filter(p=>(p.pagos||[]).length<p.nc).map(p=>({p,pf:proxFecha(p),dd:diffDias(proxFecha(p))})).filter(x=>x.dd<=7).sort((a,b)=>a.dd-b.dd);
  document.getElementById('res-cobros').innerHTML=proximos.length?proximos.map(function(x){
    var c=(S.clientes||[]).find(function(cl){return cl.id==x.p.cid;});
    var badge=x.dd<0?'<span class="bk bk-r">'+Math.abs(x.dd)+'d atraso</span>':x.dd===0?'<span class="bk bk-gold">HOY</span>':'<span class="bk bk-b">en '+x.dd+'d</span>';
    return '<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--bd)"><div><span style="font-weight:500">'+(c?c.nom:'?')+'</span> '+badge+'</div><span style="color:var(--gold);font-weight:600">'+$m(x.p.cuo)+'</span></div>';
  }).join(''):'<div class="empty">Sin cobros próximos</div>';

  document.getElementById('res-caja').innerHTML=(S.movimientos||[]).slice().reverse().slice(0,5).map(function(m){
    return '<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--bd)"><span style="font-size:12px;color:var(--t2)">'+m.con+'</span><span style="font-size:12px;font-weight:500;color:'+(m.tipo==='entrada'?'var(--green)':'var(--red)')+';">'+(m.tipo==='entrada'?'+':'-')+$m(m.mon)+'</span></div>';
  }).join('')||'<div class="empty">Sin movimientos</div>';

  const sel=document.getElementById('np-cli');
  const cur=sel.value;
  sel.innerHTML='<option value="">- Seleccionar -</option>'+(S.clientes||[]).map(c=>'<option value="'+c.id+'"'+(c.id==cur?' selected':'')+'>'+c.nom+'</option>').join('');

  document.getElementById('tbl-cli').innerHTML='<thead><tr><th>Nombre</th><th>Telf</th><th>Acciones</th></tr></thead><tbody>'+
    (S.clientes||[]).map(function(c){
      return '<tr><td>'+c.nom+'</td><td>'+(c.tel||'—')+'</td><td><button class="btn-icon" onclick="editCli(\''+c.id+'\')">✏️</button><button class="btn-icon del" onclick="delCli(\''+c.id+'\')">🗑️</button></td></tr>';
    }).join('')+'</tbody>';

  document.getElementById('tbl-pre').innerHTML='<thead><tr><th>Cliente</th><th>Capital</th><th>Interés</th><th>Cuota</th><th>Frecuencia</th><th>Pagos</th><th>Saldo</th><th>Próx. cobro</th><th>Acciones</th></tr></thead><tbody>'+
    (S.prestamos||[]).map(function(p){
      var c=(S.clientes||[]).find(function(x){return x.id==p.cid;});
      var saldo=Math.max(0,(p.cuo*p.nc)-((p.pagos||[]).length*p.cuo));
      var pf=proxFecha(p); var dd=diffDias(pf);
      var badge=saldo<=0?'<span class="bk bk-g">Listo</span>':!pf?'—':dd<0?'<span class="bk bk-r">'+Math.abs(dd)+'d</span>':dd===0?'<span class="bk bk-gold">HOY</span>':'<span class="bk bk-b">'+dd+'d</span>';
      return '<tr><td style="font-weight:500">'+(c?c.nom:'?')+'</td><td>'+$m(p.cap)+'</td><td style="color:var(--gold)">'+$m(p.int||0)+'</td><td>'+$m(p.cuo)+'</td><td style="font-size:11px;color:var(--t2)">'+(p.frec||'—')+'</td><td>'+((p.pagos||[]).length)+'/'+p.nc+'</td><td style="color:var(--green)">'+$m(saldo)+'</td><td>'+(pf?pf:'—')+' '+badge+'</td><td><button class="btn-icon" onclick="cobrar(\''+p.id+'\')" title="Cobrar">✓</button><button class="btn-icon" onclick="abrirMoverFecha(\''+p.id+'\')" title="Mover fecha">📅</button><button class="btn-icon" onclick="editPre(\''+p.id+'\')" title="Editar">✏️</button><button class="btn-icon del" onclick="delPre(\''+p.id+'\')" title="Eliminar">🗑️</button></td></tr>';
    }).join('')+'</tbody>';

  var pends=(S.prestamos||[]).filter(function(p){return(p.pagos?p.pagos.length:0)<p.nc;});
  pends.sort(function(a,b){return diffDias(proxFecha(a))-diffDias(proxFecha(b));});
  document.getElementById('cob-lista').innerHTML=pends.length?pends.map(function(p){
    var c=(S.clientes||[]).find(function(x){return x.id==p.cid;});
    var pf=proxFecha(p); var dd=diffDias(pf);
    var border=dd<0?'var(--red)':dd===0?'var(--gold)':'var(--bd)';
    var badge=!pf?'':dd<0?'<span class="bk bk-r">'+Math.abs(dd)+'d atraso</span>':dd===0?'<span class="bk bk-gold">HOY</span>':'<span class="bk bk-b">en '+dd+'d</span>';
    var waBtn=(c&&c.tel)?'<button onclick="waCobro(\''+p.id+'\')" style="background:#25D366;color:#fff;border:none;border-radius:6px;padding:5px 10px;font-size:11px;cursor:pointer;margin-left:4px">📲 WA</button>':'';
    var moverBtn='<button onclick="abrirMoverFecha(\''+p.id+'\')" style="background:var(--s3);color:var(--t2);border:1px solid var(--bd);border-radius:6px;padding:5px 10px;font-size:11px;cursor:pointer;margin-left:4px">📅 Mover</button>';
    return '<div style="display:flex;justify-content:space-between;align-items:center;padding:12px;border:1px solid '+border+';margin-bottom:8px;border-radius:8px;background:var(--s2)"><div><strong>'+(c?c.nom:'?')+'</strong> '+badge+'<br><small style="color:var(--t2)">Cuota '+((p.pagos?p.pagos.length:0)+1)+' de '+p.nc+(p.frec?' · '+p.frec:'')+(pf?' · '+pf:'')+'</small></div><div style="text-align:right"><div style="color:var(--gold);font-weight:600;font-size:18px">'+$m(p.cuo)+'</div><div style="margin-top:6px"><button class="btn" style="background:var(--green);color:#000;font-size:11px;padding:6px 10px" onclick="cobrar(\''+p.id+'\')">✓ Cobrar</button>'+waBtn+moverBtn+'</div></div></div>';
  }).join(''):'<div class="empty">No hay cobros pendientes</div>';

  document.getElementById('tbl-caj').innerHTML='<thead><tr><th>Concepto</th><th>Monto</th><th>Tipo</th><th>Acción</th></tr></thead><tbody>'+
    (S.movimientos||[]).slice().reverse().slice(0,15).map(function(m){
      return '<tr><td>'+m.con+'</td><td>'+$m(m.mon)+'</td><td><span class="bk '+(m.tipo==='entrada'?'bk-g':'bk-r')+'">'+m.tipo+'</span></td><td><button class="btn-icon" onclick="editMov(\''+m.id+'\')">✏️</button><button class="btn-icon del" onclick="delMov(\''+m.id+'\')">🗑️</button></td></tr>';
    }).join('')+'</tbody>';

  document.getElementById('tbl-soc').innerHTML='<thead><tr><th>Socio</th><th>Monto</th><th>Acción</th></tr></thead><tbody>'+
    (S.socios||[]).map(function(s){
      return '<tr><td>'+s.nom+'</td><td>'+$m(s.mon)+'</td><td><button class="btn-icon" onclick="editSoc(\''+s.id+'\')">✏️</button><button class="btn-icon del" onclick="delSoc(\''+s.id+'\')">🗑️</button></td></tr>';
    }).join('')+'</tbody>';
}

expose('waCobro',function(id){
  var p=(S.prestamos||[]).find(function(x){return x.id==id;});
  var c=(S.clientes||[]).find(function(x){return x.id==p.cid;});
  if(!c||!c.tel){alert('Sin teléfono registrado. Edita el cliente primero.');return;}
  var tel=c.tel.replace(/\D/g,'');
  var pf=proxFecha(p)||'';
  var msg='Hola '+c.nom+', le recuerdo su cuota de *$'+p.cuo.toFixed(2)+'*'+(pf?' con fecha *'+pf+'*':'')+'. Por favor coordinar el pago. Gracias!';
  window.open('https://wa.me/593'+tel.replace(/^0/,'')+'?text='+encodeURIComponent(msg),'_blank');
});

document.getElementById('nav-resumen').addEventListener('click',function(){nav('resumen',this);});
document.getElementById('nav-cobros').addEventListener('click',function(){nav('cobros',this);});
document.getElementById('nav-clientes').addEventListener('click',function(){nav('clientes',this);});
document.getElementById('nav-prestamos').addEventListener('click',function(){nav('prestamos',this);});
document.getElementById('nav-caja').addEventListener('click',function(){nav('caja',this);});
document.getElementById('nav-socios').addEventListener('click',function(){nav('socios',this);});

document.getElementById('btn-add-cli').addEventListener('click',addCliente);
document.getElementById('btn-add-pre').addEventListener('click',addPrestamo);
document.getElementById('btn-caj-ent').addEventListener('click',function(){addMovManual('entrada');});
document.getElementById('btn-caj-sal').addEventListener('click',function(){addMovManual('salida');});
document.getElementById('btn-add-soc').addEventListener('click',addSocio);

document.getElementById('np-fecha').value=hoy();
</script>
</body>
</html>
